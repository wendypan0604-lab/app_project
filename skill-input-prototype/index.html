<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Skill Input Prototype</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<svg aria-hidden="true" style="position:absolute;width:0;height:0;overflow:hidden">
<symbol id="i-file-text" viewBox="0 0 24 24"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M9 13h6"/><path d="M9 17h4"/></symbol>
<symbol id="i-presentation" viewBox="0 0 24 24"><path d="M4 4h16v11H4z"/><path d="M12 15v5"/><path d="M8 20h8"/><path d="m9 11 2-2 2 2 2-3"/></symbol>
<symbol id="i-image" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="3"/><circle cx="9" cy="9" r="1.5"/><path d="m7 17 4-4 3 3 2-2 3 3"/></symbol>
<symbol id="i-video" viewBox="0 0 24 24"><rect x="3" y="6" width="13" height="12" rx="3"/><path d="m16 10 5-3v10l-5-3z"/></symbol>
<symbol id="i-table" viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="14" rx="2"/><path d="M4 10h16M10 5v14M15 5v14"/></symbol>
<symbol id="i-podcast" viewBox="0 0 24 24"><circle cx="12" cy="12" r="2.5"/><path d="M8.5 16a6 6 0 1 1 7 0"/><path d="M6 19a9.5 9.5 0 1 1 12 0"/><path d="M12 14.5V21"/></symbol>
<symbol id="i-send" viewBox="0 0 24 24"><path d="m22 2-7 20-4-9-9-4z"/><path d="M22 2 11 13"/></symbol>
<symbol id="i-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></symbol>
<symbol id="i-sparkles" viewBox="0 0 24 24"><path d="M13 3 11.4 8.4 6 10l5.4 1.6L13 17l1.6-5.4L20 10l-5.4-1.6L13 3Z"/><path d="m5.5 15-.8 2.7-2.7.8 2.7.8.8 2.7.8-2.7 2.7-.8-2.7-.8-.8-2.7Z"/></symbol>
<symbol id="i-mic-solid" viewBox="0 0 24 24">
<path d="M16.8408 10.4971C17.1829 10.4974 17.4608 10.7751 17.4609 11.1172C17.4609 13.9201 15.3413 16.2325 12.6201 16.541V18.4951H14.5029C14.845 18.4954 15.1229 18.7731 15.123 19.1153C15.123 19.4575 14.8451 19.7351 14.5029 19.7354H9.50781C9.1654 19.7354 8.8877 19.4577 8.8877 19.1153C8.88783 18.773 9.16548 18.4951 9.50781 18.4951H11.3799V16.5401C8.65891 16.2313 6.53906 13.9198 6.53906 11.1172C6.53919 10.7749 6.81782 10.4971 7.16016 10.4971C7.50227 10.4974 7.78014 10.7751 7.78027 11.1172C7.78027 13.4449 9.67328 15.3379 12.001 15.3379C14.3282 15.3374 16.2207 13.4446 16.2207 11.1172C16.2208 10.7749 16.4985 10.4971 16.8408 10.4971Z" fill="#333B46"/>
<path fill-rule="evenodd" clip-rule="evenodd" d="M12 4.22073C13.7388 4.22087 15.1228 5.66 15.123 7.40433V10.9297C15.123 12.6743 13.7389 14.1132 12 14.1133C10.2611 14.1131 8.87793 12.6742 8.87793 10.9297V7.40433C8.87819 5.66006 10.2613 4.22096 12 4.22073ZM12 5.46097C10.9743 5.46119 10.1184 6.31642 10.1182 7.40433V10.9297C10.1182 12.0179 10.9741 12.8729 12 12.8731C13.026 12.8729 13.8828 12.0179 13.8828 10.9297V7.40433C13.8826 6.31636 13.0258 5.4611 12 5.46097Z" fill="#333B46"/>
</symbol>
</svg>
<main class="stage">
<div class="phone" data-state="default" aria-label="移动端原型">
<div class="screen">
<div class="status">
<div class="status-left"><span>18:55</span><span class="silent"></span></div>
<div class="status-icons">
<span class="signal"><i></i><i></i><i></i><i></i></span>
<span class="wifi"></span>
<span class="battery">30</span>
</div>
</div>
<header class="topbar">
<button class="pill model-pill" id="modelTrigger" aria-label="选择模型" type="button">
<span class="model-mark" id="modelMark">✹</span>
<span id="currentModel">Claude Opus 4.7</span>
<span class="chev"></span>
</button>
<div class="pill credit-pill">
<span class="coin"></span>
<span>451078</span>
<span class="divider"></span>
<span class="crown"></span>
</div>
</header>
<section class="hero">
<div class="hello">
<span class="avatar"></span>
<span>Hi，我是一号机</span>
<span class="chev"></span>
</div>
<h1>全能助手，搞定多种任务</h1>
</section>
<section class="templates" aria-label="PPT 模板">
<div class="template-head">
<span>选择模版</span>
<span class="more">更多操作</span>
</div>
<div class="template-row">
<div class="template-card t1"><span class="expand"></span></div>
<div class="template-card wide t2"><span class="expand"></span></div>
<div class="template-card t3"><span class="expand"></span></div>
</div>
<div class="ppt-settings" aria-label="PPT 设置">
<div class="mode-tabs" role="tablist" aria-label="模式">
<button class="mode-tab active" type="button" data-ppt-mode="自动">自动</button>
<button class="mode-tab" type="button" data-ppt-mode="创意">创意</button>
<button class="mode-tab" type="button" data-ppt-mode="专业">专业</button>
</div>
<div class="page-select" id="pageSelect">
<button class="page-trigger" id="pageTrigger" type="button" aria-haspopup="listbox" aria-expanded="false">
<span id="pageValue">无限制</span>
<span class="chev" aria-hidden="true"></span>
</button>
<div class="page-menu" role="listbox" aria-label="页数">
<button class="page-option active" type="button" data-page-count="无限制">无限制<span class="check-mark"></span></button>
<button class="page-option" type="button" data-page-count="5页以内">5页以内<span class="check-mark"></span></button>
<button class="page-option" type="button" data-page-count="6-10页">6-10页<span class="check-mark"></span></button>
<button class="page-option" type="button" data-page-count="11-15页">11-15页<span class="check-mark"></span></button>
<button class="page-option" type="button" data-page-count="16-20页">16-20页<span class="check-mark"></span></button>
<button class="page-option" type="button" data-page-count="20页以上">20页以上<span class="check-mark"></span></button>
</div>
</div>
</div>
</section>
<section class="skills" aria-label="技能快捷选项">
<button class="skill" data-mode="ppt">
<span class="skill-icon" style="color: var(--ppt)">
<svg class="ui-icon" aria-hidden="true"><use href="#i-presentation"></use></svg>
</span>
PPT
</button>
<button class="skill" data-mode="doc">
<span class="skill-icon" style="color: var(--doc)">
<svg class="ui-icon" aria-hidden="true"><use href="#i-file-text"></use></svg>
</span>
文档
</button>
<button class="skill" data-mode="image">
<span class="skill-icon" style="color: var(--image)">
<svg class="ui-icon" aria-hidden="true"><use href="#i-image"></use></svg>
</span>
图片
</button>
<button class="skill" data-mode="sheet">
<span class="skill-icon" style="color: var(--sheet)">
<svg class="ui-icon" aria-hidden="true"><use href="#i-table"></use></svg>
</span>
表格
</button>
<button class="skill" data-mode="video">
<span class="skill-icon" style="color: var(--video)">
<svg class="ui-icon" aria-hidden="true"><use href="#i-video"></use></svg>
</span>
视频
</button>
<button class="skill" data-mode="podcast">
<span class="skill-icon" style="color: var(--podcast)">
<svg class="ui-icon" aria-hidden="true"><use href="#i-podcast"></use></svg>
</span>
播客
</button>
</section>
<section class="composer" aria-label="输入框">
<div class="prompt"><span class="cursor"></span><span>询问任何问题，创作任何内容</span></div>
<div class="selected-chip" id="selectedChip">
<span class="skill-icon" id="selectedIcon"></span>
<span id="selectedLabel">PPT</span>
<span class="close" aria-hidden="true"></span>
</div>
<div class="composer-actions">
<span class="plus" aria-hidden="true"><svg class="ui-icon"><use href="#i-plus"></use></svg></span>
<span class="mini-pill"><span class="calendar"></span><span>+2</span><span class="chev" style="color:#9ba0aa"></span></span>
<span class="mini-pill bolt-count"><span class="bolt"></span><span>1</span></span>
<span class="bolt" aria-hidden="true"></span>
<span class="spacer"></span>
<span class="mic" aria-hidden="true">
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M16.8408 10.4971C17.1829 10.4974 17.4608 10.7751 17.4609 11.1172C17.4609 13.9201 15.3413 16.2325 12.6201 16.541V18.4951H14.5029C14.845 18.4954 15.1229 18.7731 15.123 19.1153C15.123 19.4575 14.8451 19.7351 14.5029 19.7354H9.50781C9.1654 19.7354 8.8877 19.4577 8.8877 19.1153C8.88783 18.773 9.16548 18.4951 9.50781 18.4951H11.3799V16.5401C8.65891 16.2313 6.53906 13.9198 6.53906 11.1172C6.53919 10.7749 6.81782 10.4971 7.16016 10.4971C7.50227 10.4974 7.78014 10.7751 7.78027 11.1172C7.78027 13.4449 9.67328 15.3379 12.001 15.3379C14.3282 15.3374 16.2207 13.4446 16.2207 11.1172C16.2208 10.7749 16.4985 10.4971 16.8408 10.4971Z" fill="#333B46"/>
<path fill-rule="evenodd" clip-rule="evenodd" d="M12 4.22073C13.7388 4.22087 15.1228 5.66 15.123 7.40433V10.9297C15.123 12.6743 13.7389 14.1132 12 14.1133C10.2611 14.1131 8.87793 12.6742 8.87793 10.9297V7.40433C8.87819 5.66006 10.2613 4.22096 12 4.22073ZM12 5.46097C10.9743 5.46119 10.1184 6.31642 10.1182 7.40433V10.9297C10.1182 12.0179 10.9741 12.8729 12 12.8731C13.026 12.8729 13.8828 12.0179 13.8828 10.9297V7.40433C13.8826 6.31636 13.0258 5.4611 12 5.46097Z" fill="#333B46"/>
</svg>
</span>
<button class="send" aria-label="发送"><svg class="ui-icon" aria-hidden="true"><use href="#i-send"></use></svg></button>
</div>
</section>
<section class="keyboard" aria-label="键盘">
<div class="suggestions"><span>i</span><span>the</span><span>i’m</span></div>
<div class="key-row">
<span class="key">q</span><span class="key">w</span><span class="key">e</span><span class="key">r</span><span class="key">t</span><span class="key">y</span><span class="key">u</span><span class="key">i</span><span class="key">o</span><span class="key">p</span>
</div>
<div class="key-row mid">
<span class="key">a</span><span class="key">s</span><span class="key">d</span><span class="key">f</span><span class="key">g</span><span class="key">h</span><span class="key">j</span><span class="key">k</span><span class="key">l</span>
</div>
<div class="key-row low">
<span class="key special shift"></span><span class="key">z</span><span class="key">x</span><span class="key">c</span><span class="key">v</span><span class="key">b</span><span class="key">n</span><span class="key">m</span><span class="key special delete"></span>
</div>
<div class="bottom-row">
<span class="key">123</span><span class="key">☻</span><span class="key space"></span><span class="key">↵</span>
</div>
<div class="keyboard-tools">
<span class="globe"></span>
<span class="mic">
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M16.8408 10.4971C17.1829 10.4974 17.4608 10.7751 17.4609 11.1172C17.4609 13.9201 15.3413 16.2325 12.6201 16.541V18.4951H14.5029C14.845 18.4954 15.1229 18.7731 15.123 19.1153C15.123 19.4575 14.8451 19.7351 14.5029 19.7354H9.50781C9.1654 19.7354 8.8877 19.4577 8.8877 19.1153C8.88783 18.773 9.16548 18.4951 9.50781 18.4951H11.3799V16.5401C8.65891 16.2313 6.53906 13.9198 6.53906 11.1172C6.53919 10.7749 6.81782 10.4971 7.16016 10.4971C7.50227 10.4974 7.78014 10.7751 7.78027 11.1172C7.78027 13.4449 9.67328 15.3379 12.001 15.3379C14.3282 15.3374 16.2207 13.4446 16.2207 11.1172C16.2208 10.7749 16.4985 10.4971 16.8408 10.4971Z" fill="#333B46"/>
<path fill-rule="evenodd" clip-rule="evenodd" d="M12 4.22073C13.7388 4.22087 15.1228 5.66 15.123 7.40433V10.9297C15.123 12.6743 13.7389 14.1132 12 14.1133C10.2611 14.1131 8.87793 12.6742 8.87793 10.9297V7.40433C8.87819 5.66006 10.2613 4.22096 12 4.22073ZM12 5.46097C10.9743 5.46119 10.1184 6.31642 10.1182 7.40433V10.9297C10.1182 12.0179 10.9741 12.8729 12 12.8731C13.026 12.8729 13.8828 12.0179 13.8828 10.9297V7.40433C13.8826 6.31636 13.0258 5.4611 12 5.46097Z" fill="#333B46"/>
</svg>
</span>
</div>
</section>
</div>
<div class="model-overlay" id="modelOverlay" aria-hidden="true">
<section class="model-sheet" role="dialog" aria-modal="true" aria-label="模式">
<div class="sheet-title">
<span>模式</span>
<button class="sheet-close" id="modelClose" type="button" aria-label="关闭"></button>
</div>
<div class="smart-model">
<span class="smart-icon" aria-hidden="true">
<svg viewBox="0 0 24 24" fill="none">
<path d="M12 3l1.6 5.2L19 10l-5.4 1.8L12 17l-1.6-5.2L5 10l5.4-1.8L12 3z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"></path>
<path d="M5.5 15l.8 2.5L9 18.4l-2.7.9-.8 2.7-.8-2.7-2.7-.9 2.7-.9.8-2.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"></path>
</svg>
</span>
<div>
<div class="smart-title">智选模型</div>
<div class="smart-desc">智能组合最佳AI模型完成任务</div>
</div>
</div>
<div class="model-options">
<button class="model-option selected" type="button" data-model="Claude Opus 4.7">
<span class="model-mark">✹</span>
<span><span class="model-name">Claude Opus 4.7</span><span class="model-desc">持续自主深度任务执行</span></span>
<span class="model-check"></span>
</button>
<button class="model-option" type="button" data-model="Claude Opus 4.6">
<span class="model-mark">✹</span>
<span><span class="model-name">Claude Opus 4.6</span><span class="model-desc">复杂推理、长文写作与复杂编码</span></span>
<span class="model-check"></span>
</button>
<button class="model-option" type="button" data-model="Claude Sonnet 4.6">
<span class="model-mark">✹</span>
<span><span class="model-name">Claude Sonnet 4.6</span><span class="model-desc">全能主力，日常推理与高性价比推理</span></span>
<span class="model-check"></span>
</button>
<button class="model-option" type="button" data-model="Claude Opus 4.5">
<span class="model-mark">✹</span>
<span><span class="model-name">Claude Opus 4.5</span><span class="model-desc">复杂决策，专攻复杂与高精度场景</span></span>
<span class="model-check"></span>
</button>
<button class="model-option" type="button" data-model="GPT 5.5">
<span class="gpt-mark" aria-hidden="true">◉</span>
<span><span class="model-name">GPT 5.5</span><span class="model-desc">自主执行，多工具调用</span></span>
<span class="model-check"></span>
</button>
<button class="model-option" type="button" data-model="GPT 5.3 Codex">
<span class="gpt-mark" aria-hidden="true">◉</span>
<span><span class="model-name">GPT 5.3 Codex</span><span class="model-desc">均衡稳定，编码辅助与对话兼顾</span></span>
<span class="model-check"></span>
</button>
<button class="model-option" type="button" data-model="GPT 5.4">
<span class="gpt-mark" aria-hidden="true">◉</span>
<span><span class="model-name">GPT 5.4</span><span class="model-desc">快速响应，轻量问答与内容生成</span></span>
<span class="model-check"></span>
</button>
</div>
</section>
<section class="skill-model-sheet" role="dialog" aria-modal="true" aria-label="Switch Model">
<div class="sheet-title">
<span>Switch Model</span>
<button class="sheet-close" id="skillModelClose" type="button" aria-label="关闭"></button>
</div>
<div class="switch-title">Switch Model</div>
<div class="skill-model-list" id="skillModelList"></div>
</section>
</div>
</div>
</main>
<script src="app.js"></script>
</body>
</html>
